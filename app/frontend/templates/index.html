<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 WebQuery AI Chatbot</title>
    <style>
        /* INLINE DIRECT COMPILATION FOR HUGGINGFACE IFRAMES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: #181825;
        }

        /* SIDEBAR PROPERTIES */
        .sidebar {
            width: 260px;
            background-color: #11111b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #313244;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #89b4fa, #b4befe);
            color: #11111b;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: opacity 0.2s;
        }

        .new-chat-btn:hover {
            opacity: 0.9;
        }

        .logout-btn {
            background-color: #f7768e;
            color: #11111b;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background-color: #e06c75;
        }

        .history-section h3 {
            font-size: 12px;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
            background-color: #1e1e2e;
            transition: background 0.2s;
        }

        .history-item:hover, .history-item.active {
            background-color: #313244;
        }

        .history-title {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            opacity: 0.6;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        /* CHAT INTERFACE WINDOW */
        .chat-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #1e1e2e;
        }

        .chat-header {
            padding: 20px;
            background-color: #11111b;
            border-bottom: 1px solid #313244;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 20px;
            color: #cdd6f4;
        }

        .chat-box {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #89b4fa;
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.bot, .message.bot-loading {
            background-color: #313244;
            color: #cdd6f4;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        /* INPUT FOOTER BOTTOM BAR */
        .chat-input-area {
            padding: 20px;
            background-color: #11111b;
            border-top: 1px solid #313244;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-wrapper input {
            flex-grow: 1;
            background-color: #313244;
            border: 1px solid #45475a;
            padding: 14px;
            border-radius: 8px;
            color: #cdd6f4;
            font-size: 15px;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #89b4fa;
        }

        .input-wrapper button {
            background: linear-gradient(135deg, #89b4fa, #b4befe);
            color: #11111b;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .input-wrapper button:hover {
            opacity: 0.9;
        }

        /* AUTH OVERLAY BOX MODAL */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #11111b;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .auth-card {
            background-color: #1e1e2e;
            border: 1px solid #313244;
            padding: 35px;
            border-radius: 12px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .auth-card h3 {
            color: #89b4fa;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .auth-card input {
            width: 100%;
            background-color: #313244;
            border: 1px solid #45475a;
            padding: 12px;
            border-radius: 6px;
            color: #cdd6f4;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .auth-card input:focus {
            border-color: #89b4fa;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            margin-top: 10px;
        }

        .primary-auth-btn {
            background: linear-gradient(135deg, #89b4fa, #b4befe);
            color: #11111b;
        }

        .secondary-auth-btn {
            background-color: #313244;
            color: #a6adc8;
            margin-top: 5px !important;
        }

        .auth-error {
            color: #f7768e;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h3 id="auth-title">🔒 WebQuery AI Account</h3>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password (Min 6 chars)">
            <button id="btn-login" class="primary-auth-btn">Login</button>
            <button id="btn-signup" class="secondary-auth-btn">Create Account</button>
            <p id="auth-error" class="auth-error"></p>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <button class="new-chat-btn" onclick="createNewChat()">💬 New Chat</button>
            <button id="btn-logout" class="logout-btn" style="display: none;">🚪 Logout</button>
            <div class="history-section">
                <h3>📜 Recent Chats</h3>
                <ul id="chat-history-list" class="history-list"></ul>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2>🤖 WebQuery AI — WebKey India Assistant</h2>
            </header>
            
            <div id="chat-box" class="chat-box"></div>
            
            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Ask about WebKey India..." onkeydown="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()">Send 🚀</button>
                </div>
            </footer>
        </main>
    </div>

    <script src="./static/js/script.js"></script>
</body>
</html>
